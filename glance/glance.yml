pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday

          - type: to-do

          - type: group
            title: "Vim / Neovim Mastery"
            widgets:
              - type: rss
                feeds:
                  - url: https://neovim.io/news.xml
                    title: Neovim Official
                  - url: https://this-week-in-neovim.org/rss.xml
                    title: This Week in Neovim
              - type: bookmarks
                groups:
                  - name: "Quick Motions"
                    links:
                      - name: "ciw -> Change Inside Word"
                        url: "#"
                      - name: "f{char} -> Find Char"
                        url: "#"
                      - name: "ctrl+o -> Jump Back"
                        url: "#"

